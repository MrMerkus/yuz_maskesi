<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Hareket Analiz Sistemi + Tek Kişi + Yüz Maskesi</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --teal:     #00e5cc;
      --teal-dim: #00bfa5;
      --pink:     #ff4081;
      --yellow:   #ffd600;
      --green:    #69ff47;
      --red:      #ff1744;
      --bg:       #050a0e;
      --bg2:      #0a1520;
      --bg3:      #0f1e2e;
      --border:   #1a3040;
      --text:     #cce8e0;
      --text-dim: #5a8a80;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { 
      height: 100%; 
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      padding: 10px 10px calc(10px + var(--safe-bot));
      padding-top: calc(10px + var(--safe-top));
      overflow-x: hidden;
    }

    header {
      display: flex; justify-content: space-between; align-items: flex-end;
      padding-bottom: 10px; border-bottom: 1px solid var(--border);
      margin-bottom: 10px; flex-wrap: wrap; gap: 8px;
    }
    .tag { display:block; font-size:8px; letter-spacing:2px; color:var(--teal-dim); margin-bottom:3px; }
    h1 {
      font-family:'Barlow Condensed',sans-serif;
      font-size:clamp(18px,5vw,36px); font-weight:700; letter-spacing:3px;
      color:var(--teal); line-height:1; text-shadow:0 0 20px rgba(0,229,204,.4);
    }
    .subtitle { font-size:9px; color:var(--text-dim); letter-spacing:2px; margin-top:3px; }
    .header-controls { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .badge { font-size:9px; background:var(--bg3); border:1px solid var(--border); padding:3px 8px; letter-spacing:1px; white-space:nowrap; }
    .badge span { font-size:13px; font-weight:700; }
    #fps-val { color:var(--yellow); }
    #cnt-val { color:var(--teal); }
    #model-badge { color:var(--text-dim); transition:color .4s, border-color .4s; }
    #model-badge.ready { color:var(--green); border-color:var(--green); text-shadow:0 0 8px rgba(105,255,71,.5); }
    #model-badge.error { color:var(--red); border-color:var(--red); }

    .layout { display:grid; grid-template-columns:1fr 340px; gap:12px; align-items:start; }
    @media (max-width:860px) { .layout { grid-template-columns:1fr; } }

    .cam-section { display:flex; flex-direction:column; gap:8px; }
    .canvas-wrap {
      position:relative; width:100%;
      aspect-ratio:16/9;
      background:var(--bg2); border:1px solid var(--border); overflow:hidden;
    }
    .canvas-wrap.back-cam { aspect-ratio:9/16; max-height:65vh; }
    @media (max-width:860px) {
      .canvas-wrap { aspect-ratio:4/3; }
      .canvas-wrap.back-cam { aspect-ratio:3/4; max-height:60vh; }
    }
    .grid-overlay {
      position:absolute; inset:0; z-index:1; pointer-events:none;
      background-image:
        linear-gradient(rgba(0,229,204,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,204,.035) 1px, transparent 1px);
      background-size:60px 60px;
    }
    .corner { position:absolute; width:18px; height:18px; z-index:10; }
    .corner.tl { top:6px;    left:6px;   border-top:2px solid var(--teal); border-left:2px solid var(--teal); }
    .corner.tr { top:6px;    right:6px;  border-top:2px solid var(--teal); border-right:2px solid var(--teal); }
    .corner.bl { bottom:6px; left:6px;   border-bottom:2px solid var(--teal); border-left:2px solid var(--teal); }
    .corner.br { bottom:6px; right:6px;  border-bottom:2px solid var(--teal); border-right:2px solid var(--teal); }

    #webcam, #output_canvas {
      position:absolute; left:0; top:0; width:100%; height:100%;
    }
    #webcam.mirror, #output_canvas.mirror { transform:rotateY(180deg); -webkit-transform:rotateY(180deg); }
    #output_canvas { z-index:2; }

    .cam-flip-btn {
      position:absolute; top:10px; right:10px; z-index:20;
      width:44px; height:44px;
      background:rgba(10,21,32,.82); border:1px solid var(--teal-dim);
      color:var(--teal); font-size:20px;
      display:none; align-items:center; justify-content:center;
      cursor:pointer; border-radius:50%;
      transition:all .2s;
      backdrop-filter:blur(6px);
    }
    .cam-flip-btn.visible { display:flex; }
    .cam-flip-btn:active { transform:scale(.9) rotate(180deg); background:rgba(0,229,204,.25); }
    @media (min-width:861px) { .cam-flip-btn { display:none !important; } }

    .cam-label {
      position:absolute; bottom:10px; left:50%; transform:translateX(-50%);
      z-index:15; font-size:8px; letter-spacing:2px; color:var(--teal-dim);
      background:rgba(5,10,14,.7); padding:3px 8px;
      pointer-events:none;
      display:none;
    }
    .cam-label.visible { display:block; }

    .placeholder {
      position:absolute; inset:0; z-index:3;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
      transition:opacity .3s;
    }
    .placeholder.hidden { opacity:0; pointer-events:none; }
    .ph-icon { font-size:44px; color:var(--border); animation:pulse 2.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:.25;transform:scale(1)} 50%{opacity:.6;transform:scale(1.06)} }
    .placeholder p { font-size:10px; letter-spacing:2px; color:var(--text-dim); }

    .cam-controls { display:flex; gap:8px; }
    .btn {
      flex:1; display:flex; align-items:center; justify-content:center; gap:7px;
      padding:13px 14px; border:none; cursor:pointer;
      font-family:'Space Mono',monospace; font-size:11px; letter-spacing:2px; font-weight:700;
      transition:all .2s;
      min-height:48px;
      user-select:none;
    }
    .btn:active { transform:scale(.97); }
    .btn-start { background:var(--teal); color:var(--bg); }
    .btn-start.active { background:var(--pink); color:#fff; }
    .btn-shot { background:transparent; color:var(--text-dim); border:1px solid var(--border); }
    .btn-shot:hover:not(:disabled) { border-color:var(--teal-dim); color:var(--teal); }
    .btn-shot:disabled { opacity:.3; cursor:not-allowed; }
    @media (max-width:860px) {
      .btn { font-size:10px; padding:13px 10px; }
      .btn-shot span:first-child { display:none; }
    }

    .mask-controls {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 10px;
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .mask-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .mask-input {
      flex: 2;
      background: var(--bg3);
      border: 1px solid var(--border);
      padding: 10px 12px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
    }
    .mask-input:focus { outline: none; border-color: var(--teal); }
    .mask-btn {
      background: transparent;
      border: 1px solid var(--teal-dim);
      color: var(--teal);
      padding: 8px 16px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all .2s;
      min-height: 40px;
    }
    .mask-btn:active { transform: scale(.96); }
    .mask-btn.remove {
      border-color: var(--red);
      color: var(--red);
    }
    .mask-status {
      font-size: 8px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    .metrics-panel {
      display:flex; flex-direction:column; gap:12px;
      max-height:calc(100vh - 130px); overflow-y:auto;
      scrollbar-width:thin;
    }
    @media (max-width:860px) {
      .metrics-panel { max-height:none; overflow-y:visible; }
    }
    #no-person {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:8px; padding:28px 16px; border:1px dashed var(--border);
      color:var(--text-dim); font-size:10px; letter-spacing:2px;
    }
    .person-card {
      background:var(--bg2); border:1px solid var(--border);
      border-top:3px solid var(--pc, var(--teal));
      animation:cardIn .3s ease;
    }
    @keyframes cardIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
    .p-header { display:flex; align-items:center; gap:8px; padding:9px 12px; border-bottom:1px solid var(--border); }
    .p-dot { width:9px; height:9px; border-radius:50%; background:var(--pc,var(--teal)); box-shadow:0 0 7px var(--pc,var(--teal)); flex-shrink:0; animation:blink 1.6s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
    .p-name { font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700; letter-spacing:2px; color:var(--pc,var(--teal)); }
    .p-body { padding:10px; display:flex; flex-direction:column; gap:10px; }
    .sec-title { font-size:8px; letter-spacing:3px; color:var(--text-dim); margin-bottom:7px; padding-bottom:5px; border-bottom:1px solid var(--border); }
    .ag { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
    .ac { background:var(--bg3); border:1px solid var(--border); padding:7px; transition:border-color .3s; }
    .ac.wide { grid-column:1/-1; }
    .ac.on { border-color:color-mix(in srgb, var(--pc,var(--teal)) 50%, transparent); }
    .ac-lbl { font-size:7px; letter-spacing:1.5px; color:var(--text-dim); margin-bottom:2px; }
    .ac-val { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:700; color:var(--pc,var(--teal)); line-height:1; margin-bottom:4px; }
    .bar-wrap { height:3px; background:var(--bg); border-radius:2px; overflow:hidden; }
    .bar { height:100%; background:var(--pc,var(--teal)); width:0%; border-radius:2px; transition:width .15s; }
    .sg { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
    .si { background:var(--bg3); border:1px solid var(--border); padding:6px 8px; }
    .si-lbl { font-size:7px; letter-spacing:1.5px; color:var(--text-dim); margin-bottom:2px; }
    .si-val { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:500; color:var(--text-dim); transition:all .3s; }
    .si-val.yes { color:var(--green); text-shadow:0 0 7px rgba(105,255,71,.4); }
    .sym { text-align:center; }
    .sym-score { font-family:'Barlow Condensed',sans-serif; font-size:38px; font-weight:700; color:var(--pc,var(--teal)); line-height:1; text-shadow:0 0 14px var(--pc,var(--teal)); margin-bottom:2px; }
    .sym-lbl { font-size:7px; letter-spacing:2px; color:var(--text-dim); margin-bottom:7px; }
    .sym-wrap { height:4px; background:var(--bg); border-radius:3px; overflow:hidden; }
    .sym-bar { height:100%; background:var(--pc,var(--teal)); width:0%; border-radius:3px; transition:width .5s; }
    .no-cam-warn { font-size:9px; letter-spacing:1px; color:var(--yellow); padding:6px 10px; background:rgba(255,214,0,.08); border:1px solid rgba(255,214,0,.2); display:none; margin-top:4px; }
    .no-cam-warn.visible { display:block; }
  </style>
</head>
<body>

<header>
  <div>
    <span class="tag">MEDIAPIPE · TEK KİŞİ TAKİBİ + YÜZ MASKESİ</span>
    <h1>HAREKET ANALİZ SİSTEMİ</h1>
    <p class="subtitle">Tek kişi · vücut · el · yüz · karakter maskesi</p>
  </div>
  <div class="header-controls">
    <div class="badge">FPS <span id="fps-val">0</span></div>
    <div class="badge">KİŞİ <span id="cnt-val">0</span></div>
    <div class="badge" id="model-badge">● MODEL YÜKLENİYOR</div>
  </div>
</header>

<div class="layout">

  <div class="cam-section">
    <div class="canvas-wrap" id="canvasWrap">
      <video id="webcam" autoplay playsinline></video>
      <canvas id="output_canvas"></canvas>
      <div class="grid-overlay"></div>
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <button class="cam-flip-btn" id="btnFlip" title="Kamerayı Çevir">⟳</button>
      <div class="cam-label" id="camLabel">ÖN KAMERA</div>
      <div class="placeholder" id="placeholder">
        <div class="ph-icon">⬡</div>
        <p>Kamerayı açmak için butona tıklayın</p>
      </div>
    </div>
    <div class="no-cam-warn" id="noCamWarn">⚠ Arka kamera bulunamadı, ön kameraya geri dönüldü.</div>
    <div class="cam-controls">
      <button class="btn btn-start" id="btnCam"><span>◉</span><span id="btnTxt">KAMERAYI AÇ</span></button>
      <button class="btn btn-shot" id="btnShot" disabled><span>⬛</span> EKRAN GÖRÜNTÜSÜ</button>
    </div>

    <div class="mask-controls">
      <div class="mask-row">
        <input type="text" id="charName" class="mask-input" placeholder="karakter adı (ör: kedi, panda, robot, anime-girl)" value="anime-kedi">
        <button id="applyMaskBtn" class="mask-btn">🎭 Maske Oluştur</button>
        <button id="removeMaskBtn" class="mask-btn remove">🗑 Kaldır</button>
      </div>
      <div class="mask-status" id="maskStatus">⚡ Maske devre dışı</div>
    </div>
  </div>

  <div class="metrics-panel" id="metricsPanel">
    <div id="no-person">
      <div class="icon">⬡</div>
      <p>Kişi algılanmadı</p>
    </div>
  </div>

</div>

<script type="module">
// ── 0. roundRect ─────────────────────────────────────────────────────────────
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r=0){
    if(w<2*r)r=w/2; if(h<2*r)r=h/2;
    this.beginPath();
    this.moveTo(x+r,y);
    this.arcTo(x+w,y,  x+w,y+h,r);
    this.arcTo(x+w,y+h,x,  y+h,r);
    this.arcTo(x,  y+h,x,  y,  r);
    this.arcTo(x,  y,  x+w,y,  r);
    this.closePath(); return this;
  };
}

// ── 1. IMPORTS ───────────────────────────────────────────────────────────────
import {
  PoseLandmarker, HandLandmarker, FaceLandmarker,
  FilesetResolver, DrawingUtils
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

// ── 2. DOM ──────────────────────────────────────────────────────────────────
const video = document.getElementById("webcam");
const canvas = document.getElementById("output_canvas");
const ctx = canvas.getContext("2d");
const btnCam = document.getElementById("btnCam");
const btnTxt = document.getElementById("btnTxt");
const btnShot = document.getElementById("btnShot");
const btnFlip = document.getElementById("btnFlip");
const placeholder = document.getElementById("placeholder");
const modelBadge = document.getElementById("model-badge");
const fpsVal = document.getElementById("fps-val");
const cntVal = document.getElementById("cnt-val");
const metricsPanel = document.getElementById("metricsPanel");
const noPersonEl = document.getElementById("no-person");
const canvasWrap = document.getElementById("canvasWrap");
const camLabel = document.getElementById("camLabel");
const noCamWarn = document.getElementById("noCamWarn");
const charNameInput = document.getElementById("charName");
const applyMaskBtn = document.getElementById("applyMaskBtn");
const removeMaskBtn = document.getElementById("removeMaskBtn");
const maskStatusDiv = document.getElementById("maskStatus");
let drawUtils;

// ── 3. MASK ─────────────────────────────────────────────────────────────────
let currentMaskImage = null;
let useMask = false;

async function createMaskFromCharacter(characterName) {
  return new Promise((resolve, reject) => {
    if (!characterName.trim()) reject("Karakter adı boş");
    const seed = encodeURIComponent(characterName.trim().toLowerCase().replace(/\s+/g, "-"));
    const url = `https://api.dicebear.com/9.x/adventurer/png?seed=${seed}&backgroundColor=transparent&size=200`;
    const img = new Image();
    img.crossOrigin = "Anonymous";
    img.onload = () => resolve(img);
    img.onerror = () => reject(`Resim yüklenemedi: ${characterName}`);
    img.src = url;
  });
}

async function applyMask(character) {
  if (!running) {
    maskStatusDiv.innerText = "⚠ Önce kamerayı açın!";
    return;
  }
  maskStatusDiv.innerText = `⏳ "${character}" maskesi oluşturuluyor...`;
  try {
    const maskImg = await createMaskFromCharacter(character);
    currentMaskImage = maskImg;
    useMask = true;
    maskStatusDiv.innerText = `✅ "${character}" maskesi aktif!`;
  } catch (err) {
    maskStatusDiv.innerText = `❌ Hata: ${err}`;
    useMask = false;
    currentMaskImage = null;
  }
}

function removeMask() {
  useMask = false;
  currentMaskImage = null;
  maskStatusDiv.innerText = "⚡ Maske devre dışı";
}

// ── 4. MODELLER ─────────────────────────────────────────────────────────────
let poseLM, handLM, faceLM;
let running = false, lastTime = -1, fpsCnt = 0, fpsT = performance.now();

async function setupModels() {
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
  );
  poseLM = await PoseLandmarker.createFromOptions(vision, {
    baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_heavy/float16/1/pose_landmarker_heavy.task", delegate: "GPU" },
    runningMode: "VIDEO", numPoses: 1, // sadece 1 kişi
    minPoseDetectionConfidence: 0.5, minPosePresenceConfidence: 0.5, minTrackingConfidence: 0.5
  });
  handLM = await HandLandmarker.createFromOptions(vision, {
    baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", delegate: "GPU" },
    runningMode: "VIDEO", numHands: 2,
    minHandDetectionConfidence: 0.5, minHandPresenceConfidence: 0.5, minTrackingConfidence: 0.5
  });
  faceLM = await FaceLandmarker.createFromOptions(vision, {
    baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
    outputFaceBlendshapes: true, runningMode: "VIDEO", numFaces: 1,
    minFaceDetectionConfidence: 0.5, minFacePresenceConfidence: 0.5, minTrackingConfidence: 0.5
  });
  drawUtils = new DrawingUtils(ctx);
  modelBadge.textContent = "● MODEL HAZIR";
  modelBadge.classList.add("ready");
}
setupModels().catch(err => {
  console.error(err);
  modelBadge.textContent = "● MODEL HATASI";
  modelBadge.classList.add("error");
});

// ── 5. AÇI VE YARDIMCI FONKSİYONLAR ─────────────────────────────────────────
function angle(A, B, C) {
  const bax = A.x - B.x, bay = A.y - B.y;
  const bcx = C.x - B.x, bcy = C.y - B.y;
  const mag = Math.hypot(bax, bay) * Math.hypot(bcx, bcy);
  if (!mag) return null;
  return Math.round(Math.acos(Math.max(-1, Math.min(1, (bax * bcx + bay * bcy) / mag))) * 180 / Math.PI);
}
function headRoll(lm) {
  const l = lm[33], r = lm[263];
  return (l && r) ? Math.round(Math.atan2(r.y - l.y, r.x - l.x) * 180 / Math.PI) : null;
}
function headYaw(lm) {
  const n = lm[1], le = lm[234], re = lm[454];
  if (!n || !le || !re) return null;
  const ld = Math.abs(n.x - le.x), rd = Math.abs(n.x - re.x);
  return (ld + rd) === 0 ? 0 : Math.round(((ld - rd) / (ld + rd)) * 90);
}
function mouthOpen(lm) {
  const t = lm[13], b = lm[14], l = lm[61], r = lm[291];
  if (!t || !b || !l || !r) return null;
  const v = Math.hypot(t.x - b.x, t.y - b.y);
  const h = Math.hypot(l.x - r.x, l.y - r.y);
  return h > 0 ? Math.round((v / h) * 100) : 0;
}
function bs(cats, key) {
  const c = cats.find(c => c.categoryName === key);
  return c ? +c.score : 0;
}
function expression(cats) {
  const smile = (bs(cats, "mouthSmileLeft") + bs(cats, "mouthSmileRight")) / 2;
  const blink = (bs(cats, "eyeBlinkLeft") + bs(cats, "eyeBlinkRight")) / 2;
  const jaw = bs(cats, "jawOpen"), brow = bs(cats, "browInnerUp");
  if (blink > 0.6) return "GÖZLER KAPALI";
  if (jaw > 0.5) return "AĞIZ AÇIK";
  if (smile > 0.4) return "GÜLÜMSÜYOR";
  if (brow > 0.5) return "ŞAŞIRMIŞ";
  return "NÖTR";
}

// ── 6. KAMERA AYNALAMA ──────────────────────────────────────────────────────
let currentFacing = "user";
let hasMultipleCams = false;

function labelX(nx) {
  return currentFacing === "user" ? (1 - nx) * canvas.width : nx * canvas.width;
}

function drawLabel(nx, ny, text, color) {
  const x = labelX(nx), y = ny * canvas.height;
  ctx.save();
  ctx.font = "bold 13px 'Space Mono',monospace";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  const tw = ctx.measureText(text).width + 10;
  ctx.fillStyle = "rgba(5,10,14,.82)";
  ctx.roundRect(x - tw / 2, y - 8, tw, 17, 3); ctx.fill();
  ctx.strokeStyle = color; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = color; ctx.shadowColor = color; ctx.shadowBlur = 5;
  ctx.fillText(text, x, y);
  ctx.restore();
}

function drawNameTag(lm, name, color) {
  const mx = (lm[11].x + lm[12].x) / 2, my = Math.min(lm[11].y, lm[12].y) - 0.06;
  const x = labelX(mx), y = my * canvas.height;
  ctx.save();
  ctx.font = "bold 14px 'Barlow Condensed',sans-serif";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  const tw = ctx.measureText(name).width + 14;
  ctx.fillStyle = "rgba(5,10,14,.88)";
  ctx.roundRect(x - tw / 2, y - 11, tw, 22, 4); ctx.fill();
  ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = color; ctx.shadowColor = color; ctx.shadowBlur = 8;
  ctx.fillText(name, x, y);
  ctx.restore();
}

function drawMaskOnFace(faceLandmarks, maskImg, rollAngleDeg) {
  if (!faceLandmarks || !maskImg) return;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const pt of faceLandmarks) {
    minX = Math.min(minX, pt.x);
    minY = Math.min(minY, pt.y);
    maxX = Math.max(maxX, pt.x);
    maxY = Math.max(maxY, pt.y);
  }
  const faceWidth = maxX - minX;
  const faceHeight = maxY - minY;
  if (faceWidth <= 0 || faceHeight <= 0) return;
  const centerX = (minX + maxX) / 2;
  const centerY = (minY + maxY) / 2;
  const cx = labelX(centerX);
  const cy = centerY * canvas.height;
  let drawW = faceWidth * canvas.width * 1.2;
  let drawH = faceHeight * canvas.height * 1.2;
  ctx.save();
  ctx.translate(cx, cy);
  if (rollAngleDeg !== null && !isNaN(rollAngleDeg)) ctx.rotate(rollAngleDeg * Math.PI / 180);
  ctx.drawImage(maskImg, -drawW / 2, -drawH / 2, drawW, drawH);
  ctx.restore();
}

// ── 7. TEK KİŞİ KARTI (dinamik) ─────────────────────────────────────────────
let currentCard = null;
const PERSON_COLOR = "#00e5cc";
const PERSON_NAME = "KİŞİ";

  el.className = "person-card";
  el.id = "single-card";

  el.innerHTML = `

    <div class="p-body">
      <div><div class="sec-title">EKLEM AÇILARI</div>
        <div class="ag">
          <div class="ac" id="le-c"><div class="ac-lbl">SOL DİRSEK</div><div class="ac-val" id="le-v">—°</div><div class="bar-wrap"><div class="bar" id="le-b"></div></div></div>
          <div class="ac" id="re-c"><div class="ac-lbl">SAĞ DİRSEK</div><div class="ac-val" id="re-v">—°</div><div class="bar-wrap"><div class="bar" id="re-b"></div></div></div>
          <div class="ac" id="ls-c"><div class="ac-lbl">SOL OMUZ</div><div class="ac-val" id="ls-v">—°</div><div class="bar-wrap"><div class="bar" id="ls-b"></div></div></div>
          <div class="ac" id="rs-c"><div class="ac-lbl">SAĞ OMUZ</div><div class="ac-val" id="rs-v">—°</div><div class="bar-wrap"><div class="bar" id="rs-b"></div></div></div>
          <div class="ac" id="lk-c"><div class="ac-lbl">SOL DİZ</div><div class="ac-val" id="lk-v">—°</div><div class="bar-wrap"><div class="bar" id="lk-b"></div></div></div>
          <div class="ac" id="rk-c"><div class="ac-lbl">SAĞ DİZ</div><div class="ac-val" id="rk-v">—°</div><div class="bar-wrap"><div class="bar" id="rk-b"></div></div></div>
          <div class="ac wide" id="ss-c"><div class="ac-lbl">OMUZ GENİŞLİĞİ</div><div class="ac-val" id="ss-v">—°</div><div class="bar-wrap"><div class="bar" id="ss-b"></div></div></div>
          <div class="ac wide" id="ha-c"><div class="ac-lbl">KALÇA AÇISI</div><div class="ac-val" id="ha-v">—°</div><div class="bar-wrap"><div class="bar" id="ha-b"></div></div></div>

          <div class="ac wide" id="mouth-c"><div class="ac-lbl">AĞIZ AÇIKLIĞI %</div><div class="ac-val" id="mouth-v">—%</div><div class="bar-wrap"><div class="bar" id="mouth-b"></div></div></div>
        </div>

        </div>
      </div>

          <div class="si"><div class="si-lbl">SOL EL</div><div class="si-val" id="lhStat">HAYIR</div></div>

function updateUI(hasPerson) {
  cntVal.textContent = hasPerson ? "1" : "0";
  noPersonEl.style.display = hasPerson ? "none" : "flex";
  if (hasPerson) {
    if (!currentCard || !document.getElementById("single-card")) {
      if (currentCard) currentCard.remove();
      currentCard = buildSingleCard();
      metricsPanel.appendChild(currentCard);
    }
  } else {
    if (currentCard) currentCard.remove();
    currentCard = null;
  }
}

function setAngle(id, deg) {
  const v = document.getElementById(id + "-v"), b = document.getElementById(id + "-b"), c = document.getElementById(id + "-c");
  if (!v) return;
  if (deg === null) { v.textContent = "—°"; if (b) b.style.width = "0%"; if (c) c.classList.remove("on"); return; }
  v.textContent = `${deg}°`;
  if (b) b.style.width = `${Math.min(100, (deg / 180) * 100)}%`;
  if (c) c.classList.add("on");
}
function setAnglePct(id, val, max = 100) {
  const v = document.getElementById(id + "-v"), b = document.getElementById(id + "-b"), c = document.getElementById(id + "-c");
  if (!v) return;
  if (val === null) { v.textContent = "—%"; if (b) b.style.width = "0%"; return; }
  v.textContent = `${val}%`;
  if (b) b.style.width = `${Math.min(100, (Math.abs(val) / max) * 100)}%`;
  if (c) c.classList.add("on");
}
function setStat(id, active) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = active ? "ALGILANDI" : "HAYIR";
  el.className = "si-val" + (active ? " yes" : "");
}
function setTxt(id, txt, hi = false) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = txt;
  el.className = "si-val" + (hi ? " yes" : "");
}
function setSymmetry(score) {
  const s = document.getElementById("symScore"), b = document.getElementById("symBar");
  if (!s) return;
  if (score === null) { s.textContent = "—"; if (b) b.style.width = "0%"; return; }
  s.textContent = `${score}%`; if (b) b.style.width = `${score}%`;
}

// ── 8. ANA DÖNGÜ (TEK KİŞİ) ─────────────────────────────────────────────────
function predict() {
  if (!running) return;
  fpsCnt++;
  const now = performance.now();
  if (now - fpsT >= 500) {
    fpsVal.textContent = Math.round(fpsCnt * 1000 / (now - fpsT));
    fpsCnt = 0; fpsT = now;
  }
  if (lastTime !== video.currentTime) {
    lastTime = video.currentTime;
    if (canvas.width !== video.videoWidth) { canvas.width = video.videoWidth; canvas.height = video.videoHeight; }

    ctx.save(); ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (currentFacing === "user") { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }

    const poseResult = poseLM.detectForVideo(video, now);
    const handResult = handLM.detectForVideo(video, now);
    const faceResult = faceLM.detectForVideo(video, now);

    const poses = poseResult.landmarks ?? [];
    const hasPose = poses.length > 0;
    updateUI(hasPose);

    if (hasPose) {
      const lm = poses[0]; // tek kişi
      // vücut çizimi
      ctx.shadowColor = PERSON_COLOR; ctx.shadowBlur = 12;
      drawUtils.drawConnectors(lm, PoseLandmarker.POSE_CONNECTIONS, { color: PERSON_COLOR, lineWidth: 3 });
      drawUtils.drawLandmarks(lm, { color: "#fff", fillColor: PERSON_COLOR, lineWidth: 1, radius: 4 });
      ctx.shadowBlur = 0;
      ctx.restore(); ctx.save();
      drawNameTag(lm, PERSON_NAME, PERSON_COLOR);
      if (currentFacing === "user") { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }

      // açılar
      const le = angle(lm[11], lm[13], lm[15]), re = angle(lm[12], lm[14], lm[16]);
      const ls = angle(lm[13], lm[11], lm[23]), rs = angle(lm[14], lm[12], lm[24]);
      const lk = angle(lm[23], lm[25], lm[27]), rk = angle(lm[24], lm[26], lm[28]);
      const ss = angle(lm[23], lm[11], lm[12]), ha = angle(lm[11], lm[23], lm[25]);

      setAngle("le", le); setAngle("re", re);
      setAngle("ls", ls); setAngle("rs", rs);
      setAngle("lk", lk); setAngle("rk", rk);
      setAngle("ss", ss); setAngle("ha", ha);

      ctx.restore(); ctx.save();
      if (le !== null) drawLabel(lm[13].x, lm[13].y, `${le}°`, PERSON_COLOR);
      if (re !== null) drawLabel(lm[14].x, lm[14].y, `${re}°`, PERSON_COLOR);
      if (lk !== null) drawLabel(lm[25].x, lm[25].y, `${lk}°`, PERSON_COLOR);
      if (rk !== null) drawLabel(lm[26].x, lm[26].y, `${rk}°`, PERSON_COLOR);
      if (currentFacing === "user") { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }

      document.getElementById("ptsCount").innerText = lm.length;
      setStat("poseStat", true);

      const pairs = [[le, re], [ls, rs], [lk, rk]].filter(([a, b]) => a !== null && b !== null);
      if (pairs.length) {
        const avgDiff = pairs.reduce((s, [a, b]) => s + Math.abs(a - b), 0) / pairs.length;
        const sim = Math.round(Math.max(0, 100 - (avgDiff / 90) * 100));
        setSymmetry(sim);
      } else setSymmetry(null);

      // Yüz
      const faces = faceResult.faceLandmarks ?? [];
      const blendshapes = faceResult.faceBlendshapes ?? [];
      if (faces.length > 0) {
        const flm = faces[0];
        const fbs = blendshapes[0]?.categories ?? [];
        const faceDiv = document.getElementById("face-section");
        if (faceDiv) faceDiv.style.display = "block";

        setAnglePct("roll", headRoll(flm), 90);
        setAnglePct("yaw", headYaw(flm), 90);
        setAnglePct("mouth", mouthOpen(flm), 100);

        const smile = (bs(fbs, "mouthSmileLeft") + bs(fbs, "mouthSmileRight")) / 2;
        const blink = (bs(fbs, "eyeBlinkLeft") + bs(fbs, "eyeBlinkRight")) / 2;
        setTxt("expr", expression(fbs));
        setTxt("smile", smile > 0.4 ? "EVET" : "HAYIR", smile > 0.4);
        setTxt("blink", blink > 0.6 ? "EVET" : "HAYIR", blink > 0.6);
        setTxt("fdet", "ALGILANDI", true);

        // MASKE (sadece bu kişiye)
        if (useMask && currentMaskImage) {
          const roll = headRoll(flm);
          drawMaskOnFace(flm, currentMaskImage, roll);
        }

        // Yüz çizimleri (isteğe bağlı)
        ctx.save(); ctx.globalAlpha = 0.85;
        drawUtils.drawConnectors(flm, FaceLandmarker.FACE_LANDMARKS_FACE_OVAL, { color: PERSON_COLOR, lineWidth: 1.5 });
        drawUtils.drawConnectors(flm, FaceLandmarker.FACE_LANDMARKS_LIPS, { color: PERSON_COLOR, lineWidth: 1.2 });
        drawUtils.drawConnectors(flm, FaceLandmarker.FACE_LANDMARKS_LEFT_EYE, { color: "#30FF30", lineWidth: 1.2 });
        drawUtils.drawConnectors(flm, FaceLandmarker.FACE_LANDMARKS_RIGHT_EYE, { color: "#FF3030", lineWidth: 1.2 });
        ctx.globalAlpha = 1; ctx.restore();
      } else {
        const faceDiv = document.getElementById("face-section");
        if (faceDiv) faceDiv.style.display = "none";
        setTxt("fdet", "ALGILANMADI", false);
      }
    } else {
      // Hiç kişi yok
      setStat("poseStat", false);
      setSymmetry(null);
      const faceDiv = document.getElementById("face-section");
      if (faceDiv) faceDiv.style.display = "none";
    }

    // Eller (çoklu el desteği devam eder, ama sadece algılanan ilk kişiyle eşleştir)
    const hands = handResult.landmarks ?? [];
    const handedness = handResult.handednesses ?? [];
    if (hands.length && hasPose) {
      const mainPose = poses[0];
      let leftDetected = false, rightDetected = false;
      for (let h = 0; h < hands.length; h++) {
        const hlm = hands[h];
        const wrist = hlm[0];
        const leftShoulder = mainPose[11], rightShoulder = mainPose[12];
        const dLeft = Math.hypot(wrist.x - leftShoulder.x, wrist.y - leftShoulder.y);
        const dRight = Math.hypot(wrist.x - rightShoulder.x, wrist.y - rightShoulder.y);
        const cat = handedness[h]?.[0]?.categoryName;
        if (cat === "Left" || dLeft < dRight) leftDetected = true;
        if (cat === "Right" || dRight < dLeft) rightDetected = true;
        const col = PERSON_COLOR;
        ctx.shadowColor = col; ctx.shadowBlur = 10;
        drawUtils.drawConnectors(hlm, HandLandmarker.HAND_CONNECTIONS, { color: col, lineWidth: 2.5 });
        drawUtils.drawLandmarks(hlm, { color: "#fff", fillColor: col, lineWidth: 1, radius: 3 });
        ctx.shadowBlur = 0;
      }
      setStat("lhStat", leftDetected);
      setStat("rhStat", rightDetected);
    } else {
      setStat("lhStat", false);
      setStat("rhStat", false);
    }

    ctx.restore();
  }
  requestAnimationFrame(predict);
}

// ── 9. KAMERA BAŞLATMA ──────────────────────────────────────────────────────
async function startCamera(facing = "user") {
  video.srcObject?.getTracks().forEach(t => t.stop());
  video.srcObject = null;
  noCamWarn.classList.remove("visible");
  const isBack = facing === "environment";
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: facing }, width: { ideal: isBack ? 1920 : 1280 }, height: { ideal: isBack ? 1080 : 720 } }
    });
    const track = stream.getVideoTracks()[0];
    const settings = track.getSettings();
    if (settings.facingMode) currentFacing = settings.facingMode;
    updateMirror();
    video.srcObject = stream;
    return new Promise((res) => { video.onloadeddata = async () => { await video.play(); res(); }; });
  } catch (e) {
    if (facing === "environment") {
      noCamWarn.classList.add("visible");
      currentFacing = "user";
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 1280, height: 720 } });
      const track = stream.getVideoTracks()[0];
      if (track.getSettings().facingMode) currentFacing = track.getSettings().facingMode;
      updateMirror();
      video.srcObject = stream;
      return new Promise((res) => { video.onloadeddata = async () => { await video.play(); res(); }; });
    }
    throw e;
  }
}

function updateMirror() {
  const isFront = currentFacing === "user";
  video.classList.toggle("mirror", isFront);
  canvas.classList.remove("mirror");
  canvasWrap.classList.toggle("back-cam", !isFront);
  camLabel.textContent = isFront ? "ÖN KAMERA" : "ARKA KAMERA";
  camLabel.classList.add("visible");
  lastTime = -1;
}

// ── 10. OLAY YÖNETİCİLERİ ───────────────────────────────────────────────────
btnCam.addEventListener("click", async () => {
  if (!poseLM || !handLM || !faceLM) { alert("Modeller yükleniyor..."); return; }
  if (running) {
    running = false;
    btnTxt.textContent = "KAMERAYI AÇ";
    btnCam.classList.remove("active");
    btnShot.disabled = true;
    btnFlip.classList.remove("visible");
    camLabel.classList.remove("visible");
    video.srcObject?.getTracks().forEach(t => t.stop());
    video.srcObject = null;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    placeholder.classList.remove("hidden");
    canvasWrap.classList.remove("back-cam");
    updateUI(false);
    fpsVal.textContent = "0";
    noCamWarn.classList.remove("visible");
    removeMask();
  } else {
    running = true;
    btnTxt.textContent = "KAMERAYI KAPAT";
    btnCam.classList.add("active");
    btnShot.disabled = false;
    placeholder.classList.add("hidden");
    currentFacing = "user";
    try {
      await startCamera(currentFacing);
      const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
      if (isMobile || hasMultipleCams) btnFlip.classList.add("visible");
      predict();
    } catch (e) {
      alert("Kamera hatası: " + e.message);
      running = false;
      btnTxt.textContent = "KAMERAYI AÇ";
      btnCam.classList.remove("active");
      placeholder.classList.remove("hidden");
    }
  }
});

btnFlip.addEventListener("click", async () => {
  if (!running) return;
  btnFlip.style.transform = "rotate(180deg)";
  setTimeout(() => btnFlip.style.transform = "", 300);
  const newFacing = currentFacing === "user" ? "environment" : "user";
  currentFacing = newFacing;
  try { await startCamera(currentFacing); } catch (e) { alert("Geçiş hatası: " + e.message); }
});

btnShot.addEventListener("click", () => {
  const tmp = document.createElement("canvas");
  tmp.width = canvas.width; tmp.height = canvas.height;
  const t = tmp.getContext("2d");
  if (currentFacing === "user") {
    t.save(); t.translate(tmp.width, 0); t.scale(-1, 1); t.drawImage(video, 0, 0, tmp.width, tmp.height); t.restore();
    t.save(); t.translate(tmp.width, 0); t.scale(-1, 1); t.drawImage(canvas, 0, 0); t.restore();
  } else {
    t.drawImage(video, 0, 0, tmp.width, tmp.height);
    t.drawImage(canvas, 0, 0);
  }
  const a = document.createElement("a");
  a.download = `hareket-${Date.now()}.png`;
  a.href = tmp.toDataURL("image/png");
  a.click();
});

applyMaskBtn.addEventListener("click", () => {
  const name = charNameInput.value.trim();
  if (!name) { maskStatusDiv.innerText = "⚠ Bir karakter adı girin"; return; }
  applyMask(name);
});
removeMaskBtn.addEventListener("click", removeMask);

window.addEventListener("orientationchange", () => {
  if (running) setTimeout(async () => { try { await startCamera(currentFacing); } catch (e) {} }, 400);
});

checkCameras();
async function checkCameras() {
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    hasMultipleCams = devices.filter(d => d.kind === "videoinput").length > 1;
  } catch (e) { hasMultipleCams = false; }
}
